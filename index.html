<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Klas 27-nji Mekdep • Synpdaşlar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-container" id="app">
    <!-- Giriş ekrany -->
    <div class="auth-screen" id="authScreen">
        <div class="logo">Klas<span>.</span></div>
        <div class="sub">27-nji mekdep • 2000-nji nesil</div>
        <div class="avatar-big">👥</div>
        
        <div class="input-group">
            <label>Adyňyz we Familiýaňyz</label>
            <input type="text" id="authName" placeholder="Mysal: Aman Geldiýew" value="Aman">
        </div>
        <div class="input-group">
            <label>Klas / Grup</label>
            <input type="text" id="authClass" placeholder="Mysal: 11A" value="11A">
        </div>

        <button class="btn-primary" id="loginBtn">Giriş</button>
        <button class="btn-google" id="googleBtn">🔵 Gmail bilen giriş</button>
        
        <div class="auth-toggle">
            Täze hasap? <a id="toggleRegister">Hasap aç</a>
        </div>
        <div class="toast" id="toastMsg"></div>
    </div>

    <!-- Esasy Söhbet paneli -->
    <div class="main-screen" id="mainScreen">
        <div class="main-header">
            <div class="user-info">
                <div class="user-avatar" id="mainAvatar">A</div>
                <div>
                    <div class="user-name" id="mainName">Aman Geldiýew</div>
                    <div class="user-role" id="mainClass">11A</div>
                </div>
            </div>
            <button class="btn-logout" id="logoutBtn">Çykmak</button>
        </div>

        <div class="chat-area" id="chatArea">
            <div style="text-align:center; color:#94a3b8; font-size:13px; padding:20px;">Söhbet başlatmak üçin habar ýazyň</div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Habaryňyzy ýazyň..." maxlength="200">
            <button id="sendBtn">➤</button>
        </div>

        <div class="action-bar">
            <button class="btn-call" id="callBtn">📹 Wideo jaň (Simulýasiýa)</button>
        </div>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
